{% extends "base.html" %}
{% block title %}Add Food Listing – HarvestHaul{% endblock %}
{% block content %}
<div class="form-wrap">
  <div class="form-card">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Back to dashboard</a>
    <h1 class="form-heading">📦 List surplus food</h1>
    <p class="form-sub">Our Supplier Agent will process this and find a match immediately.</p>
    <form method="POST" class="auth-form">
      <div class="field-row">
        <div class="field">
          <label>Food type</label>
          <input type="text" name="food_type" placeholder="e.g. Tomatoes, Bread, Rice" required>
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="number" name="quantity" placeholder="50" step="0.1" min="0.1" required>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Unit</label>
          <select name="unit">
            <option value="kg">kg</option>
            <option value="lbs">lbs</option>
            <option value="litres">litres</option>
            <option value="portions">portions</option>
            <option value="boxes">boxes</option>
          </select>
        </div>
        <div class="field">
          <label>Expires in (hours)</label>
          <input type="number" name="expiry_hours" placeholder="48" min="1" max="168" required>
        </div>
      </div>
      <div class="field">
        <label>Pickup location</label>
        <input type="text" name="location" placeholder="Street address or landmark" required>
      </div>
      <div class="field">
        <label>Notes <span class="opt">(optional)</span></label>
        <textarea name="notes" rows="2" placeholder="Storage conditions, contact info, access instructions…"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Submit listing</button>
    </form>
  </div>
</div>
{% endblock %}
