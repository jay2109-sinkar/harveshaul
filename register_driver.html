{% extends "base.html" %}
{% block title %}Volunteer as Driver – HarvestHaul{% endblock %}
{% block content %}
<div class="form-wrap">
  <div class="form-card">
    <a href="{{ url_for('dashboard') }}" class="back-link">← Back to dashboard</a>
    <h1 class="form-heading">🚗 Join the driver network</h1>
    <p class="form-sub">The Logistics Agent will assign you rescue routes when there's a match in your area.</p>
    <form method="POST" class="auth-form">
      <div class="field-row">
        <div class="field">
          <label>Phone number</label>
          <input type="tel" name="phone" placeholder="+91 98765 43210" required>
        </div>
        <div class="field">
          <label>Vehicle type</label>
          <select name="vehicle">
            <option value="bike">Motorbike</option>
            <option value="car">Car</option>
            <option value="auto">Auto-rickshaw</option>
            <option value="van">Van / Tempo</option>
            <option value="cycle">Bicycle</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Service area</label>
        <input type="text" name="area" placeholder="e.g. Andheri West, Mumbai" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Register as volunteer driver</button>
    </form>
  </div>
</div>
{% endblock %}
